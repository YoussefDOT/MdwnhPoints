<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو مدونة - قائمة الانجاز</title>

    <!-- Google Fonts: Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind Cached CSS -->
    <link href="./style.css" rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .cubic-bezier-wheel {
            transition-timing-function: cubic-bezier(0.15, 0, 0.1, 1) !important;
        }

        .vertical-text {
            display: inline-block;
            transform: rotate(90deg);
            transform-origin: center;
            white-space: nowrap;
            max-width: 150px;
        }
    </style>
</head>

<body class="min-h-screen antialiased overflow-x-hidden selection:bg-spanish selection:text-white pb-10">
    <div id="root"></div>

    <!-- Modular Firebase SDK Setup -->
    <script type="module">
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, push, remove, serverTimestamp, query, limitToLast, orderByChild } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        window.firebaseModular = {
            initializeApp, getApp, getApps, getDatabase, ref, onValue, set, get, push, remove, serverTimestamp, query, limitToLast, orderByChild
        };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- React App logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDVNQ5Nh8JpaOZIb6bhou6x2JAvjn8Ik4U",
            authDomain: "mdwnhpoints.firebaseapp.com",
            databaseURL: "https://mdwnhpoints-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mdwnhpoints",
            storageBucket: "mdwnhpoints.firebasestorage.app",
            messagingSenderId: "225704093916",
            appId: "1:225704093916:web:a1455885c84101b6b02c19",
            measurementId: "G-23C0KNL9VM"
        };

        const MEMBERS = [
            "اسيل", "الشعيرة", "جمانة", "خالد حسن", "خالد", "رجب", "سحاب", "سعيد", "شارد", "شفق", "طه", "عاصم", "عبدالرحمن بندر", "علي مجدي", "عمر", "فرات", "مايتو", "محمد سمير", "مصطفى", "ملك", "منة", "مورو", "نجود", "ورقاء", "يوسف"
        ];

        const PUNISHMENTS = [
            "امشي ١٠.٠٠٠ آلاف خطوة.",
            "احفظ سورة الفرقان أو الحجر أو الرعد.",
            "اعمل لـ ٣ أيام بدون النمط الداكن للشاشة.",
            "٣ أيام بدون هاتف صيام ٣ أيام تطوع.",
            "اقرأ ٥٠ صفحة من كتاب الكتب التالية ( مع الله، زاد، لكنود، رقائق القرآن).",
            "أشرف أو أقم نشاط أو جلسة في النادي.",
            "اعمل وأنت تقف ليوم كامل.",
            "أكتب آية ( أرأيت من أتبع إلهه هواه ) بخط النسخ ١٠ مرات.",
            "ضع في صورة العرض الخاصة بك ( كسول يحتاج التأديب)",
            "قم بالطبخ لعائلتك اليوم ( لأولاد).",
            "قم بتمرين الضغط ٤٠ مرة ( لأولاد).",
            "قم بأداء صوتي لإبن القاضي منصور (لأولاد).",
            "ايقظ جميع رفاقك في العمل للفجر.",
            "اطعم أو اسقي حيوان.",
            "استمع لبودكاست لا تقل مدته عن ٣ ساعات.",
            "قم بإهداء جارك أو رفيقك.",
            "اقرأ الوسائل المفيدة للحياة السعيدة.",
            "قم بمهمة شخصين من رفاقك.",
            "انشر بعد الفجر اذكار الصباح لأسبوع كامل.",
            "سكواد ٤٠ عدة",
            "سجل أو أكتب كملة تحفيزية لأعضاء"
        ];

        const REWARDS = [5, 10, 20, 30];

        // Premium Audio System for Rewards
        const playPointAudio = (points) => {
            try {
                let soundNum = "1";
                if (points === 10) soundNum = "2";
                if (points === 20) soundNum = "3";
                if (points === 30) soundNum = "4";

                const audio = new Audio(`./sounds/${soundNum}.mp3`);
                audio.volume = 0.5;
                audio.play().catch(err => console.error("Audio error:", err));
            } catch (e) {
                console.error("Audio system error:", e);
            }
        };

        const triggerConfetti = (points) => {
            const count = points === 5 ? 40 : points === 10 ? 80 : points === 20 ? 150 : 300;
            const spread = points === 5 ? 45 : points === 10 ? 70 : points === 20 ? 100 : 160;
            const colors = ['#f4c82b', '#f04e3a', '#3bb9ab', '#086fb6', '#faf9f7'];
            confetti({
                particleCount: count,
                spread: spread,
                origin: { y: 0.6 },
                colors: colors,
                disableForReducedMotion: true,
                zIndex: 2000
            });
        };

        function App() {
            const [db, setDb] = useState(null);
            const [dbError, setDbError] = useState(null);

            useEffect(() => {
                const initFb = () => {
                    if (window.firebaseModular && !db) {
                        try {
                            const { initializeApp, getApp, getApps, getDatabase } = window.firebaseModular;
                            const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
                            setDb(getDatabase(app));
                        } catch (e) {
                            setDbError(e.message);
                        }
                    }
                };
                if (window.firebaseModular) initFb();
                else window.addEventListener('firebaseReady', initFb);
                return () => window.removeEventListener('firebaseReady', initFb);
            }, [db]);

            if (dbError) {
                return <div className="p-10 text-center text-carmine font-bold text-xl">حدث خطأ: {dbError}</div>;
            }

            if (!db) {
                return (
                    <div className="flex h-screen items-center justify-center">
                        <div className="loader !w-16 !h-16 !border-4 !border-spanish"></div>
                    </div>
                );
            }
            return <Game db={db} />;
        }

        function Game({ db }) {
            const { ref, onValue, set, get, push, remove, serverTimestamp } = window.firebaseModular;

            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem("mdwnh_user") || null);
            const [targetUser, setTargetUser] = useState(null);
            const [players, setPlayers] = useState([]);

            const [isAddingPoints, setIsAddingPoints] = useState(false);
            const [addingPointsLabel, setAddingPointsLabel] = useState(null);
            const [manualTargetPoints, setManualTargetPoints] = useState("");
            const [achievementNote, setAchievementNote] = useState("");
            const [historyLogs, setHistoryLogs] = useState([]);

            const [showJournalModal, setShowJournalModal] = useState(false);
            const [journalNote, setJournalNote] = useState("");
            const [journalDate, setJournalDate] = useState("");
            const [isAddingJournal, setIsAddingJournal] = useState(false);
            const [editingJournalId, setEditingJournalId] = useState(null);

            // Lucky Wheel State
            const [showWheelModal, setShowWheelModal] = useState(false);
            const [activeWheelType, setActiveWheelType] = useState(null); // 'PUNISHMENT' | 'REWARD' | null
            const [wheelSpinning, setWheelSpinning] = useState(false);
            const [wheelRotation, setWheelRotation] = useState(0);
            const [wheelResult, setWheelResult] = useState(null);
            const [showWheelResultOverlay, setShowWheelResultOverlay] = useState(false);
            const [isAudioLoading, setIsAudioLoading] = useState(false);
            const wheelAudioRef = useRef(null);

            // Edit popup state
            const [editPopup, setEditPopup] = useState(null); // { log } or null
            const [editPopupNote, setEditPopupNote] = useState("");
            const [editPopupDate, setEditPopupDate] = useState("");
            const [isEditSaving, setIsEditSaving] = useState(false);

            // Custom date picker state
            const [showDatePicker, setShowDatePicker] = useState(false);
            const [datePickerTarget, setDatePickerTarget] = useState(null); // 'main' or 'edit'
            const [pickerMonth, setPickerMonth] = useState(new Date().getMonth());
            const [pickerYear, setPickerYear] = useState(new Date().getFullYear());

            // Member password system
            const [pendingUser, setPendingUser] = useState(null);
            const [memberPasswordMode, setMemberPasswordMode] = useState(null); // 'set' | 'enter'
            const [memberPasswordInput, setMemberPasswordInput] = useState("");
            const [memberPasswordError, setMemberPasswordError] = useState("");
            const [isMemberPasswordLoading, setIsMemberPasswordLoading] = useState(false);

            // Helper to handle Arabic numerals during data entry
            const arabicToLatin = (str) => {
                const map = { '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4', '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9' };
                return String(str).replace(/[٠-٩]/g, (mat) => map[mat]);
            };
            const [historyFilterUser, setHistoryFilterUser] = useState("ALL");
            const [historySettings, setHistorySettings] = useState({ showLogs: true, showPunishments: true, showRewards: true });

            const [celebration, setCelebration] = useState(null);
            const [isCelebrationClosing, setIsCelebrationClosing] = useState(false);
            const [showSparkles, setShowSparkles] = useState(false);
            const [sparklePositions, setSparklePositions] = useState([]);
            const [isPageSuckingIn, setIsPageSuckingIn] = useState(false);
            const [pointsPopAnim, setPointsPopAnim] = useState(false);

            const [toast, setToast] = useState(null); // { message, visible }
            const [dbError, setDbError] = useState(null);

            const [adminMode, setAdminMode] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);

            useEffect(() => {
                const playersRef = ref(db, 'players');
                const unsubscribe = onValue(playersRef, (snapshot) => {
                    setDbError(null);
                    const data = snapshot.val() || {};
                    const parsedPlayers = Object.entries(data).map(([name, info]) => ({
                        name,
                        points: info.totalPoints || 0
                    })).sort((a, b) => b.points - a.points);
                    setPlayers(parsedPlayers);
                }, (error) => {
                    setDbError(error.message);
                });

                const historyRef = ref(db, 'history');
                const hUnsubscribe = onValue(historyRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    const parsedHistory = Object.entries(data).map(([id, info]) => ({
                        id,
                        ...info
                    })).sort((a, b) => b.timestamp - a.timestamp);
                    setHistoryLogs(parsedHistory);
                });

                return () => { unsubscribe(); hUnsubscribe(); };
            }, [db]);

            // Reset scroll to top when changing "pages" (user/admin login/logout)
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentUser, adminMode, showPasswordPrompt]);

            // Member password system
            const selectUser = async (name) => {
                setIsMemberPasswordLoading(true);
                setPendingUser(name);
                try {
                    // Always read fresh from Firebase - never use cached data
                    const playerRef = ref(db, `players/${name}/password`);
                    const snap = await get(playerRef);
                    if (snap.exists() && snap.val()) {
                        setMemberPasswordMode('enter');
                    } else {
                        setMemberPasswordMode('set');
                    }
                } catch (e) {
                    setMemberPasswordMode('set');
                } finally {
                    setIsMemberPasswordLoading(false);
                    setMemberPasswordInput("");
                    setMemberPasswordError("");
                }
            };

            const finishMemberLogin = (name) => {
                setCurrentUser(name);
                localStorage.setItem("mdwnh_user", name);
                setPendingUser(null);
                setMemberPasswordMode(null);
                setMemberPasswordInput("");
                setMemberPasswordError("");
            };

            const handleMemberPassword = async (e) => {
                e.preventDefault();
                if (!memberPasswordInput.trim()) return;
                setIsMemberPasswordLoading(true);
                try {
                    // Always read fresh - ensures manual Firebase changes work immediately
                    const playerRef = ref(db, `players/${pendingUser}/password`);
                    if (memberPasswordMode === 'set') {
                        await set(playerRef, memberPasswordInput.trim());
                        finishMemberLogin(pendingUser);
                    } else {
                        const snap = await get(playerRef);
                        const storedPw = snap.val();
                        if (storedPw && storedPw === memberPasswordInput.trim()) {
                            finishMemberLogin(pendingUser);
                        } else {
                            setMemberPasswordError("كلمة المرور غير صحيحة. حاول مرة أخرى.");
                        }
                    }
                } catch (err) {
                    setMemberPasswordError("حدث خطأ. حاول مرة أخرى.");
                } finally {
                    setIsMemberPasswordLoading(false);
                }
            };

            const showToast = (message) => {
                setToast({ message, visible: true });
                setTimeout(() => {
                    setToast(prev => prev ? { ...prev, visible: false } : null);
                    setTimeout(() => setToast(null), 400);
                }, 3000);
            };

            const toggleHistorySetting = async (key) => {
                const newVal = !historySettings[key];
                const updated = { ...historySettings, [key]: newVal };
                setHistorySettings(updated);

                if (adminMode) {
                    try {
                        const settingsRef = ref(db, 'settings/historyVisibility');
                        await set(settingsRef, updated);
                    } catch (e) {
                        console.error("Failed to sync settings:", e);
                    }
                }
            };

            const logout = () => {
                setCurrentUser(null);
                setAdminMode(false);
                setTargetUser(null);
                localStorage.removeItem("mdwnh_user");
            };

            const attemptAdminLogin = (e) => {
                e.preventDefault();
                if (passwordInput === "144noon") {
                    setAdminMode(true);
                    setShowPasswordPrompt(false);
                    setPasswordInput("");
                } else {
                    alert("كلمة المرور غير صحيحة!");
                }
            };

            const triggerCelebration = (person, points, silent = false) => {
                if (!silent) playPointAudio(points);
                setIsPageSuckingIn(true);
                setTimeout(() => {
                    setCelebration({ user: person, points: 30 });
                    setIsCelebrationClosing(false);
                    triggerConfetti(30);
                    setIsPageSuckingIn(false);
                    setTimeout(() => {
                        const newSparkles = [...Array(30)].map(() => {
                            let top, left;
                            do {
                                top = Math.random() * 100;
                                left = Math.random() * 100;
                            } while (Math.sqrt(Math.pow(top - 50, 2) + Math.pow(left - 50, 2)) < 30);
                            return { top, left, delay: Math.random() * 0.5, speed: 2.5 + Math.random() * 2 };
                        });
                        setSparklePositions(newSparkles);
                        setShowSparkles(true);
                    }, 2000);
                    setTimeout(() => setIsCelebrationClosing(true), 5200);
                    setTimeout(() => { setCelebration(null); setShowSparkles(false); }, 6000);
                }, 700);
            };

            const performAddPoints = async (amount, person, options = {}) => {
                const { silent = false, noToast = false, noConfetti = false, skipCelebrationSound = false } = options;
                setIsAddingPoints(true);
                setAddingPointsLabel(amount);

                let amountNum = 0;
                try {
                    amountNum = parseInt(arabicToLatin(amount)) || 0;
                    if (!silent) await new Promise(resolve => setTimeout(resolve, 300));

                    const playerRef = ref(db, `players/${person}`);
                    const snapshot = await get(playerRef);
                    const currentData = snapshot.val() || { totalPoints: 0 };

                    await set(playerRef, {
                        ...currentData,
                        totalPoints: (currentData.totalPoints || 0) + amountNum,
                        lastUpdated: serverTimestamp()
                    });

                    const historyDbRef = ref(db, 'history');
                    await push(historyDbRef, {
                        user: person,
                        amount: amountNum,
                        note: options.note || achievementNote || (options.isWheel ? (options.isPunishment ? "دائرة العقاب" : "دائرة المكافأة") : ""),
                        timestamp: Date.now(),
                        isWheel: options.isWheel || false,
                        isPunishment: options.isPunishment || false
                    });

                    const shouldConfetti = !silent && !noConfetti;

                    if (!silent && !adminMode && amountNum === 30) {
                        triggerCelebration(person, 30, skipCelebrationSound);
                    } else if (shouldConfetti) {
                        if (!silent) playPointAudio(amountNum);
                        triggerConfetti(amountNum);
                    }

                    if (amountNum === 30 && silent) {
                        triggerCelebration(person, 30, true);
                    } else if (silent && amountNum < 30 && !noConfetti) {
                        triggerConfetti(amountNum);
                    }

                    if (amountNum !== 30) {
                        setPointsPopAnim(true);
                        setTimeout(() => setPointsPopAnim(false), 700);
                    }

                    if (!noToast && amountNum !== 30) {
                        showToast("شكرًا على عملكم المتقن!");
                    }
                    setAchievementNote("");

                } catch (error) {
                    alert("تعذر إضافة النقاط. " + error.message);
                } finally {
                    if (amountNum === 30 && !silent) await new Promise(resolve => setTimeout(resolve, 3000));
                    setIsAddingPoints(false);
                    setAddingPointsLabel(null);
                }
            };

            const spinWheel = async (type) => {
                if (wheelSpinning || isAudioLoading) return;

                const result = type === 'PUNISHMENT'
                    ? PUNISHMENTS[Math.floor(Math.random() * PUNISHMENTS.length)]
                    : REWARDS[Math.floor(Math.random() * REWARDS.length)];

                // Pre-load audio
                setIsAudioLoading(true);
                const soundFile = type === 'PUNISHMENT' ? './sounds/العقاب.mp3' : (result === 30 ? './sounds/المكافأة كبيرة.mp3' : './sounds/المكافأة.mp3');

                try {
                    const audio = new Audio(soundFile);
                    await new Promise((resolve, reject) => {
                        audio.oncanplaythrough = resolve;
                        audio.onerror = reject;
                        // Timeout after 3 seconds if audio fails to load to not block interaction
                        setTimeout(resolve, 3000);
                    });

                    wheelAudioRef.current = audio;
                    setIsAudioLoading(false);

                    setWheelResult(result);
                    setWheelSpinning(true);
                    setShowWheelResultOverlay(false);

                    const items = type === 'PUNISHMENT' ? PUNISHMENTS : REWARDS;
                    const resultIndex = items.indexOf(result);
                    const segmentAngle = 360 / items.length;
                    const extraSpins = 12;

                    const currentRotationMod = wheelRotation % 360;
                    const labelPosFromZero = (resultIndex * segmentAngle) + (segmentAngle / 2);
                    const deltaRotation = (360 - (labelPosFromZero + currentRotationMod) % 360 + 360) % 360;
                    const finalRotation = wheelRotation + deltaRotation + (extraSpins * 360);

                    setWheelRotation(finalRotation);
                    audio.play().catch(e => console.log("Audio play failed", e));

                    // IF Result is 30, we trigger celebration at 8.5 seconds for perfect sync
                    if (type === 'REWARD' && result === 30) {
                        setTimeout(() => {
                            performAddPoints("30", currentUser, { silent: true, isWheel: true });
                        }, 8500);
                    }

                    setTimeout(() => {
                        setWheelSpinning(false);
                        if (type === 'PUNISHMENT') {
                            performAddPoints("0", currentUser, {
                                silent: true,
                                isWheel: true,
                                isPunishment: true,
                                noConfetti: true,
                                noToast: true,
                                note: result
                            });
                            setShowWheelResultOverlay(true);
                        } else if (type === 'REWARD') {
                            if (result < 30) {
                                performAddPoints(result.toString(), currentUser, { silent: true, isWheel: true });
                                setShowWheelResultOverlay(true);
                            } else {
                                // For +30, showing the result popup before the celebration animation fades out
                                setTimeout(() => {
                                    setShowWheelResultOverlay(true);
                                }, 3000);
                            }
                        } else {
                            setShowWheelResultOverlay(true);
                        }
                    }, 9500);
                } catch (e) {
                    console.error("Audio failed to load", e);
                    setIsAudioLoading(false);
                }
            };

            const performSaveJournal = async () => {
                if (!journalNote.trim() || !journalDate) return;
                setIsAddingJournal(true);
                try {
                    const timestamp = new Date(journalDate).getTime();
                    const entryData = {
                        user: currentUser,
                        amount: 0,
                        note: journalNote,
                        timestamp: timestamp,
                        isJournal: true
                    };

                    const isUpdating = !!editingJournalId;
                    if (editingJournalId) {
                        const journalRef = ref(db, 'history/' + editingJournalId);
                        await set(journalRef, entryData);
                        setEditingJournalId(null);
                    } else {
                        const historyDbRef = ref(db, 'history');
                        await push(historyDbRef, entryData);
                    }

                    setJournalNote("");
                    setJournalDate("");
                    showToast(isUpdating ? "تم تحديث العمل بنجاح!" : "تم تسجيل العمل بنجاح!");
                } catch (error) {
                    alert("تعذر حفظ العمل. " + error.message);
                } finally {
                    setIsAddingJournal(false);
                }
            };

            // Edit popup - opens instead of scrolling to top form
            const startEditingJournal = (log) => {
                setEditPopupNote(log.note || "");
                // Build a local ISO datetime string so no timezone shift occurs when saving
                if (log.timestamp) {
                    const d = new Date(log.timestamp);
                    const localStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}T${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    setEditPopupDate(localStr);
                } else {
                    setEditPopupDate("");
                }
                setEditPopup({ log });
                setMemberPasswordError("");
            };

            const saveEditPopup = async () => {
                if (!editPopupNote.trim()) return;
                setIsEditSaving(true);
                try {
                    const log = editPopup.log;
                    const timestamp = editPopupDate ? new Date(editPopupDate).getTime() : log.timestamp;
                    const journalRef = ref(db, 'history/' + log.id);
                    await set(journalRef, {
                        user: log.user,
                        amount: log.amount || 0,
                        note: editPopupNote.trim(),
                        timestamp,
                        ...(log.isJournal ? { isJournal: true } : {})
                    });
                    setEditPopup(null);
                    showToast("تم تحديث العمل بنجاح!");
                } catch (err) {
                    alert("تعذر التعديل: " + err.message);
                } finally {
                    setIsEditSaving(false);
                }
            };

            // Custom Date Picker helpers
            const openDatePicker = (target) => {
                const existing = target === 'edit' ? editPopupDate : journalDate;
                const base = existing ? new Date(existing) : new Date();
                setPickerMonth(base.getMonth());
                setPickerYear(base.getFullYear());
                setDatePickerTarget(target);
                setShowDatePicker(true);
            };

            const selectDate = (day) => {
                const dateStr = `${pickerYear}-${String(pickerMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                if (datePickerTarget === 'edit') {
                    // Preserve existing time, only change the date
                    const existingTs = editPopup?.log?.timestamp;
                    if (existingTs) {
                        const existingDate = new Date(existingTs);
                        const hours = String(existingDate.getHours()).padStart(2, '0');
                        const mins = String(existingDate.getMinutes()).padStart(2, '0');
                        setEditPopupDate(`${dateStr}T${hours}:${mins}`);
                    } else {
                        setEditPopupDate(dateStr);
                    }
                } else {

                try {
                    const journalRef = ref(db, 'history/' + id);
                    const snapshot = await get(journalRef);
                    const logData = snapshot.val();

                    if (logData) {
                        // 1. Sync Points if it's a point-bearing task
                        if (logData.amount > 0) {
                            const playerRef = ref(db, `players/${logData.user}/totalPoints`);
                            const playerSnap = await get(playerRef);
                            const currentTotal = playerSnap.val() || 0;
                            await set(playerRef, Math.max(0, currentTotal - logData.amount));
                        }

                        // 2. Remove the actual log
                        await remove(journalRef);
                    }

                    setToast("تم حذف العمل وتحديث الرصيد!");
                    setTimeout(() => setToast(null), 3500);

                try {
                    // 1. Update Player Score
                    const playerRef = ref(db, `players/${log.user}/totalPoints`);
                    const snapshot = await get(playerRef);
                    const currentPoints = snapshot.val() || 0;
                    await set(playerRef, Math.max(0, currentPoints - log.amount));

                    // 2. Remove History Entry
                    const historyRef = ref(db, `history/${log.id}`);
                    await remove(historyRef);

                    showToast("تم حذف الإنجاز وتحديث الرصيد!");

                                            }}
                                        >
                                            <svg className="w-5 h-5 sm:w-7 sm:h-7 fill-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]" viewBox="0 0 24 24" style={{ stroke: 'none' }}>
                                                <path d="M12 2L10.5 8.5L4 10L10.5 11.5L12 18L13.5 11.5L20 10L13.5 8.5L12 2Z" />
                                            </svg>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Lucky Wheel Modal */}
                    {showWheelModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-3xl animate-fade-in p-4 overflow-hidden">
                            <div className="relative w-full max-w-4xl h-full max-h-[85vh] flex flex-col items-center justify-center">

                                {/* Close Button */}
                                {!wheelSpinning && !showWheelResultOverlay && (
                                    <button
                                        onClick={() => setShowWheelModal(false)}
                                        className="absolute top-0 right-0 w-12 h-12 rounded-full bg-snow/10 hover:bg-carmine text-snow font-black transition-colors z-50 flex items-center justify-center p-0"
                                    >✕</button>
                                )}

                                {/* Initial Selection Screen */}
                                {!activeWheelType && (
                                    <div className="text-center animate-explosiveIn">
                                        <h2 className="text-4xl sm:text-5xl font-black text-snow mb-12 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">اختبر حظك اليوم</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 px-4 w-full max-w-2xl mx-auto">
                                            {/* Punishment Wheel Card */}
                                            <button
                                                onClick={() => setActiveWheelType('PUNISHMENT')}
                                                className="group relative p-8 glass-panel border-carmine/30 hover:border-carmine transition-all duration-500 hover:scale-105"
                                            >
                                                <div className="absolute inset-0 bg-carmine/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>
                                                <div className="text-6xl mb-6 drop-shadow-[0_0_20px_rgba(240,78,58,0.5)] group-hover:animate-spin">🎡</div>
                                                <h3 className="text-2xl font-black text-carmine mb-2">دائرة العقاب</h3>
                                                <p className="text-snow/50 text-sm">تحديات صعبة للمقصرين</p>
                                                <div className="mt-6 w-full h-1 bg-carmine/20 rounded-full overflow-hidden">
                                                    <div className="h-full bg-carmine w-0 group-hover:w-full transition-all duration-700"></div>
                                                </div>
                                            </button>

                                            {/* Reward Wheel Card */}
                                            <button
                                                onClick={() => setActiveWheelType('REWARD')}
                                                className="group relative p-8 glass-panel border-verdigris/30 hover:border-verdigris transition-all duration-500 hover:scale-105"
                                            >
                                                <div className="absolute inset-0 bg-verdigris/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>
                                                <div className="text-6xl mb-6 drop-shadow-[0_0_20px_rgba(31,168,161,0.5)] group-hover:animate-spin">🎡</div>
                                                <h3 className="text-2xl font-black text-verdigris mb-2">دائرة المكافأة</h3>
                                                <p className="text-snow/50 text-sm">جوائز مستحقة للمجتهدين</p>
                                                <div className="mt-6 w-full h-1 bg-verdigris/20 rounded-full overflow-hidden">
                                                    <div className="h-full bg-verdigris w-0 group-hover:w-full transition-all duration-700"></div>
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Spinning Wheel Screen */}
                                {activeWheelType && !showWheelResultOverlay && (
                                    <div className="flex flex-col items-center animate-fadeIn w-full h-full justify-center">
                                        <div className="relative w-full flex justify-center items-center mb-8">
                                            <button
                                                disabled={wheelSpinning}
                                                onClick={() => setActiveWheelType(null)}
                                                className="absolute left-4 text-snow/40 hover:text-snow disabled:opacity-0 transition-colors py-2 px-4 bg-darker/50 rounded-xl border border-snow/10"
                                            >← رجوع</button>
                                            <h2 className={`text-4xl font-black drop-shadow-lg ${activeWheelType === 'PUNISHMENT' ? 'text-carmine' : 'text-verdigris'}`}>
                                                {activeWheelType === 'PUNISHMENT' ? 'دائرة العقاب' : 'دائرة المكافأة'}
                                            </h2>
                                        </div>

                                        <div className="relative w-80 h-80 sm:w-96 sm:h-96 mb-12">
                                            {/* Pointer */}
                                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-20 drop-shadow-lg">
                                                <div
                                                    className="w-8 h-10 bg-saffron border-x-4 border-t-4 border-darker"
                                                    style={{ clipPath: 'polygon(0 0, 100% 0, 50% 100%)' }}
                                                ></div>
                                            </div>

                                            {/* Wheel */}
                                            <div
                                                className="w-full h-full rounded-full border-8 border-darker shadow-[0_0_60px_rgba(0,0,0,0.8)] relative overflow-hidden transition-transform duration-[9500ms] cubic-bezier-wheel"
                                                style={{
                                                    transform: `rotate(${wheelRotation}deg)`,
                                                    background: activeWheelType === 'PUNISHMENT'
                                                        ? `conic-gradient(from 0deg, 
                                                            #1a1a1a 0%, #1a1a1a 4.76%, 
                                                            #f04e3a33 4.76%, #f04e3a33 9.52%, 
                                                            #1a1a1a 9.52%, #1a1a1a 14.28%, 
                                                            #f04e3a33 14.28%, #f04e3a33 19.04%, 
                                                            #1a1a1a 19.04%, #1a1a1a 23.8%, 
                                                            #f04e3a33 23.8%, #f04e3a33 28.56%, 
                                                            #1a1a1a 28.56%, #1a1a1a 33.32%, 
                                                            #f04e3a33 33.32%, #f04e3a33 38.08%, 
                                                            #1a1a1a 38.08%, #1a1a1a 42.84%, 
                                                            #f04e3a33 42.84%, #f04e3a33 47.6%, 
                                                            #1a1a1a 47.6%, #1a1a1a 52.36%, 
                                                            #f04e3a33 52.36%, #f04e3a33 57.12%, 
                                                            #1a1a1a 57.12%, #1a1a1a 61.88%, 
                                                            #f04e3a33 61.88%, #f04e3a33 66.64%, 
                                                            #1a1a1a 66.64%, #1a1a1a 71.4%, 
                                                            #f04e3a33 71.4%, #f04e3a33 76.16%, 
                                                            #1a1a1a 76.16%, #1a1a1a 80.92%, 
                                                            #f04e3a33 80.92%, #f04e3a33 85.68%, 
                                                            #1a1a1a 85.68%, #1a1a1a 90.44%, 
                                                            #f04e3a33 90.44%, #f04e3a33 95.2%, 
                                                            #1a1a1a 95.2%, #1a1a1a 100%)`
                                                        : `conic-gradient(from 0deg, 
                                                            #1a1a1a 0%, #1a1a1a 25%, 
                                                            #3bb9ab33 25%, #3bb9ab33 50%, 
                                                            #1a1a1a 50%, #1a1a1a 75%, 
                                                            #3bb9ab33 75%, #3bb9ab33 100%)`
                                                }}
                                            >
                                                {/* Text segments (Punishment has 21, rewards 4) */}
                                                {(activeWheelType === 'PUNISHMENT' ? PUNISHMENTS : REWARDS).map((item, i, arr) => {
                                                    const angle = (360 / arr.length);
                                                    const isPunishment = arr.length > 5;
                                                    const spokeRotation = i * angle + (angle / 2);
                                                    return (
                                                        <div
                                                            key={i}
                                                            className="absolute top-0 left-1/2 -translate-x-1/2 h-1/2 origin-bottom flex flex-col items-center justify-start"
                                                            style={{
                                                                transform: `rotate(${spokeRotation}deg)`,
                                                                width: '1px' // Absolute center line
                                                            }}
                                                        >
                                                            <div className={`font-black text-snow drop-shadow-2xl text-center leading-tight transition-all duration-300 ${isPunishment ? 'vertical-text h-[130px] text-[7px] sm:text-[9px] pt-10' : 'vertical-text h-[120px] text-4xl sm:text-5xl pt-12'}`}>
                                                                {isPunishment ? item : `+${item}`}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* Center Button */}
                                            <button
                                                disabled={wheelSpinning || isAudioLoading}
                                                onClick={() => spinWheel(activeWheelType)}
                                                className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-darker rounded-full z-30 flex items-center justify-center border-4 ${activeWheelType === 'PUNISHMENT' ? 'border-carmine' : 'border-verdigris'} shadow-xl group disabled:opacity-50`}
                                            >
                                                <div className={`w-16 h-16 rounded-full flex items-center justify-center text-white font-black text-xl transition-transform group-hover:scale-110 ${activeWheelType === 'PUNISHMENT' ? 'bg-carmine shadow-[0_0_20px_rgba(240,78,58,0.5)]' : 'bg-verdigris shadow-[0_0_20px_rgba(31,168,161,0.5)]'}`}>
                                                    {isAudioLoading ? (
                                                        <div className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                    ) : wheelSpinning ? '...' : 'لف'}
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Result Overlay */}
                                {showWheelResultOverlay && wheelResult && (
                                    <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md animate-explosiveIn p-4">
                                        <div className={`glass-panel w-full max-w-sm p-8 text-center border-2 shadow-[0_0_100px_rgba(0,0,0,0.5)] ${activeWheelType === 'PUNISHMENT' ? 'border-carmine shadow-carmine/20' : 'border-verdigris shadow-verdigris/20'}`}>
                                            <div className={`w-32 h-32 rounded-full mx-auto mb-6 overflow-hidden border-4 ${activeWheelType === 'PUNISHMENT' ? 'border-carmine' : 'border-verdigris'}`}>
                                                <img src={`./MdwnhMembers/${currentUser}.png`} alt={currentUser} className="w-full h-full object-cover" />
                                            </div>
                                            <h3 className={`text-4xl font-black mb-4 ${activeWheelType === 'PUNISHMENT' ? 'text-carmine' : 'text-verdigris'}`}>
                                                {activeWheelType === 'PUNISHMENT' ? 'صدر الحكم!' : 'مبروووك! 🎉'}
                                            </h3>
                                            <div className="bg-darker p-6 rounded-2xl border border-snow/10 mb-8">
                                                <p className="text-2xl font-bold text-snow leading-relaxed">
                                                    {activeWheelType === 'PUNISHMENT' ? wheelResult : `لقد حصلت على +${wheelResult} نقطة!`}
                                                </p>
                                            </div>
                                            <p className="text-snow/50 text-sm mb-6 font-medium animate-pulse">قم بالتقاط الشاشة وارسلها للمشرف 📸</p>
                                            <button
                                                onClick={() => { setShowWheelModal(false); setShowWheelResultOverlay(false); setActiveWheelType(null); }}
                                                className={`w-full py-4 rounded-xl font-black text-xl transition-all shadow-lg ${activeWheelType === 'PUNISHMENT' ? 'bg-darker text-snow border border-carmine hover:bg-carmine' : 'bg-verdigris text-darker hover:bg-teal-400'}`}
                                            >تم</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
