<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو مدونة - جدول الصدارة</title>

    <!-- Google Fonts: Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rubik', 'sans-serif'],
                    },
                    colors: {
                        raisin: '#262626',
                        snow: '#faf9f7',
                        saffron: '#f4c82b',
                        carmine: '#f04e3a',
                        verdigris: '#3bb9ab',
                        spanish: '#086fb6',
                        darker: '#1a1a1a'
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    },
                    animation: {
                        blob1: "blob 15s infinite alternate ease-in-out",
                        blob2: "blob 20s infinite alternate-reverse ease-in-out",
                        blob3: "blob 18s infinite alternate ease-in-out",
                        blob4: "blob 22s infinite alternate-reverse ease-in-out"
                    }
                }
            }
        }
    </script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background-color: #262626;
            /* Raisin Black */
            color: #faf9f7;
            /* Snow Text */
            font-family: 'Rubik', sans-serif;
        }

        .glass-panel {
            background: rgba(45, 45, 45, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #faf9f7;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Toast Animation */
        @keyframes slideUpFade {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .toast-anim {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen antialiased overflow-x-hidden selection:bg-spanish selection:text-white pb-10">
    <div id="root"></div>

    <!-- Modular Firebase SDK Setup -->
    <script type="module">
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, push, serverTimestamp, query, limitToLast, orderByChild } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        window.firebaseModular = {
            initializeApp, getApp, getApps, getDatabase, ref, onValue, set, get, push, serverTimestamp, query, limitToLast, orderByChild
        };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- React App logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDVNQ5Nh8JpaOZIb6bhou6x2JAvjn8Ik4U",
            authDomain: "mdwnhpoints.firebaseapp.com",
            databaseURL: "https://mdwnhpoints-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mdwnhpoints",
            storageBucket: "mdwnhpoints.firebasestorage.app",
            messagingSenderId: "225704093916",
            appId: "1:225704093916:web:a1455885c84101b6b02c19",
            measurementId: "G-23C0KNL9VM"
        };

        const MEMBERS = [
            "اسيل", "الشعيرة", "جمانة", "خالد حسن", "خالد", "رجب", "سحاب", "سعيد", "شارد", "شفق", "طه", "عاصم", "عبدالرحمن بندر", "علي مجدي", "عمر", "فرات", "مايتو", "محمد سمير", "مصطفى", "ملك", "منة", "مورو", "نجود", "ورقاء", "يوسف"
        ];

        // Synthesizer for Playful Sound Effects
        const playSynthSound = (points) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const playBeep = (freq, type, startTime, duration, vol = 0.2) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(vol, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                if (points === 5) {
                    playBeep(659.25, 'sine', now, 0.15, 0.3); // E5
                } else if (points === 10) {
                    playBeep(523.25, 'triangle', now, 0.1, 0.3); // C5
                    playBeep(783.99, 'triangle', now + 0.1, 0.2, 0.3); // G5
                } else if (points === 20) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.3);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (points >= 30) {
                    playBeep(523.25, 'sawtooth', now, 0.1, 0.2); // C5
                    playBeep(659.25, 'sawtooth', now + 0.1, 0.1, 0.2); // E5
                    playBeep(783.99, 'sawtooth', now + 0.2, 0.1, 0.2); // G5
                    playBeep(1046.50, 'sawtooth', now + 0.3, 0.4, 0.2); // C6
                }
            } catch (e) {
                console.log("Audio disabled");
            }
        };

        const triggerConfetti = (points) => {
            const count = points === 5 ? 40 : points === 10 ? 80 : points === 20 ? 150 : 300;
            const spread = points === 5 ? 45 : points === 10 ? 70 : points === 20 ? 100 : 160;
            const colors = ['#f4c82b', '#f04e3a', '#3bb9ab', '#086fb6', '#faf9f7'];
            confetti({
                particleCount: count,
                spread: spread,
                origin: { y: 0.6 },
                colors: colors,
                disableForReducedMotion: true
            });
        };

        function App() {
            const [db, setDb] = useState(null);
            const [dbError, setDbError] = useState(null);

            useEffect(() => {
                const initFb = () => {
                    if (window.firebaseModular && !db) {
                        try {
                            const { initializeApp, getApp, getApps, getDatabase } = window.firebaseModular;
                            const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
                            setDb(getDatabase(app));
                        } catch (e) {
                            setDbError(e.message);
                        }
                    }
                };
                if (window.firebaseModular) initFb();
                else window.addEventListener('firebaseReady', initFb);
                return () => window.removeEventListener('firebaseReady', initFb);
            }, [db]);

            if (dbError) {
                return <div className="p-10 text-center text-carmine font-bold text-xl">حدث خطأ: {dbError}</div>;
            }

            if (!db) {
                return (
                    <div className="flex h-screen items-center justify-center">
                        <div className="loader !w-16 !h-16 !border-4 !border-spanish"></div>
                    </div>
                );
            }
            return <Game db={db} />;
        }

        function Game({ db }) {
            const { ref, onValue, set, get, serverTimestamp } = window.firebaseModular;

            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem("mdwnh_user") || null);
            const [targetUser, setTargetUser] = useState(null);
            const [players, setPlayers] = useState([]);

            const [isAddingPoints, setIsAddingPoints] = useState(false);
            const [addingPointsLabel, setAddingPointsLabel] = useState(null);
            const [manualTargetPoints, setManualTargetPoints] = useState("");

            const [toast, setToast] = useState(null);
            const [dbError, setDbError] = useState(null);

            const [adminMode, setAdminMode] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);

            useEffect(() => {
                const playersRef = ref(db, 'players');
                const unsubscribe = onValue(playersRef, (snapshot) => {
                    setDbError(null);
                    const data = snapshot.val() || {};
                    const parsedPlayers = Object.entries(data).map(([name, info]) => ({
                        name,
                        points: info.totalPoints || 0
                    })).sort((a, b) => b.points - a.points);
                    setPlayers(parsedPlayers);
                }, (error) => {
                    setDbError(error.message);
                });
                return () => unsubscribe();
            }, [db]);

            const selectUser = (name) => {
                setCurrentUser(name);
                localStorage.setItem("mdwnh_user", name);
            };

            const logout = () => {
                setCurrentUser(null);
                setAdminMode(false);
                setTargetUser(null);
                localStorage.removeItem("mdwnh_user");
            };

            const attemptAdminLogin = (e) => {
                e.preventDefault();
                if (passwordInput === "144noon") {
                    setAdminMode(true);
                    setShowPasswordPrompt(false);
                    setPasswordInput("");
                } else {
                    alert("كلمة المرور غير صحيحة!");
                }
            };

            const performAddPoints = async (amount, person) => {
                setIsAddingPoints(true);
                setAddingPointsLabel(amount);
                await new Promise(resolve => setTimeout(resolve, 300));

                try {
                    const playerRef = ref(db, `players/${person}`);
                    const snapshot = await get(playerRef);
                    const currentData = snapshot.val() || { totalPoints: 0 };

                    await set(playerRef, {
                        totalPoints: currentData.totalPoints + amount,
                        lastUpdated: serverTimestamp()
                    });

                    playSynthSound(amount);
                    triggerConfetti(amount);

                    setToast("شكرًا على عملكم المتقن!");
                    setTimeout(() => setToast(null), 3500);

                } catch (error) {
                    alert("تعذر إضافة النقاط. " + error.message);
                } finally {
                    setIsAddingPoints(false);
                    setAddingPointsLabel(null);
                }
            };

            const performSetPoints = async (person) => {
                if (manualTargetPoints === "" || isNaN(manualTargetPoints)) return;
                setIsAddingPoints(true);
                setAddingPointsLabel('SET');

                try {
                    const playerRef = ref(db, `players/${person}`);
                    await set(playerRef, {
                        totalPoints: parseInt(manualTargetPoints, 10),
                        lastUpdated: serverTimestamp()
                    });

                    playSynthSound(30);
                    setToast("تم تعيين النقاط بنجاح!");
                    setTimeout(() => setToast(null), 3500);
                    setManualTargetPoints("");

                } catch (error) {
                    alert("خطأ: " + error.message);
                } finally {
                    setIsAddingPoints(false);
                    setAddingPointsLabel(null);
                }
            };

            const addPoints = (amount) => {
                const person = adminMode && targetUser ? targetUser : currentUser;
                if (!person) return;
                performAddPoints(amount, person);
            };

            const top3 = players.slice(0, 3);
            const activeActionUser = adminMode ? (targetUser || "اختر عضواً") : currentUser;

            return (
                <div className="relative min-h-screen">
                    {/* Animated Blob Gradients matching Brand Colors */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-[-1] opacity-50 mix-blend-screen">
                        <div className="absolute w-[600px] h-[600px] rounded-full bg-saffron/20 blur-3xl -top-40 -left-20 animate-blob1"></div>
                        <div className="absolute w-[500px] h-[500px] rounded-full bg-verdigris/20 blur-3xl top-40 -right-20 animate-blob2"></div>
                        <div className="absolute w-[700px] h-[700px] rounded-full bg-carmine/20 blur-3xl -bottom-40 left-40 animate-blob3"></div>
                        <div className="absolute w-[600px] h-[600px] rounded-full bg-spanish/20 blur-3xl bottom-10 right-20 animate-blob4"></div>
                    </div>

                    {/* Centered Toast */}
                    {toast && (
                        <div className="fixed bottom-10 inset-x-0 mx-auto w-max z-50 flex justify-center toast-anim">
                            <div className="bg-darker text-snow font-bold px-8 py-4 rounded-full shadow-[0_10px_40px_rgba(8,111,182,0.4)] border border-snow/10 flex items-center gap-3 text-lg">
                                <span>🎉</span>
                                {toast}
                            </div>
                        </div>
                    )}

                    {(!currentUser && !adminMode && !showPasswordPrompt) && (
                        <>
                            {/* specific login bg */}
                            <div className="fixed inset-0 z-[-2] opacity-10 bg-cover bg-center" style={{ backgroundImage: "url('./BG.jpg')" }}></div>

                            <div className="max-w-4xl mx-auto p-6 pt-16 flex flex-col items-center">
                                <div className="mb-12 drop-shadow-2xl">
                                    <img src="./Logo.png" alt="ستوديو مدونة" className="h-20 sm:h-24 object-contain" style={{ filter: "brightness(0) invert(1)" }} />
                                </div>
                                <div className="w-full text-center mb-8">
                                    <h2 className="text-2xl font-black text-saffron drop-shadow-md">اختر أسمك</h2>
                                    <p className="text-snow/70 mt-2 text-sm">شگرا لاعمالكم الرئعة</p>
                                </div>

                                <div className="flex flex-wrap justify-center gap-4 sm:gap-5 max-w-2xl mx-auto mt-2">
                                    {MEMBERS.map((name) => (
                                        <button
                                            key={name}
                                            onClick={() => selectUser(name)}
                                            className="group flex flex-col items-center gap-2 transition-transform hover:-translate-y-1 active:scale-95"
                                        >
                                            <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full border-[3px] border-darker bg-darker overflow-hidden group-hover:border-spanish transition-colors shadow-lg">
                                                <img src={`./MdwnhMembers/${name}.png`} alt={name} className="w-full h-full object-cover" onError={(e) => { e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23262626" width="100" height="100"/><text x="50" y="55" font-family="sans-serif" font-size="40" text-anchor="middle" fill="%23faf9f7">?</text></svg>' }} />
                                            </div>
                                            <span className="text-snow font-bold text-sm tracking-wide bg-darker/80 px-4 py-1.5 rounded-full group-hover:bg-spanish transition-colors">
                                                {name}
                                            </span>
                                        </button>
                                    ))}
                                </div>

                                <button onClick={() => setShowPasswordPrompt(true)} className="mt-20 text-xs text-snow/30 hover:text-snow/80 transition-colors select-none">
                                    خيارات القائد
                                </button>
                            </div>
                        </>
                    )}

                    {showPasswordPrompt && (
                        <div className="max-w-md mx-auto mt-32 p-8 glass-panel text-center">
                            <h2 className="text-2xl font-bold text-snow mb-6">لوحة تحكم القائد</h2>
                            <form onSubmit={attemptAdminLogin} className="flex flex-col gap-4">
                                <input
                                    type="password"
                                    placeholder="كلمة المرور"
                                    value={passwordInput}
                                    onChange={(e) => setPasswordInput(e.target.value)}
                                    className="px-4 py-3 rounded-xl bg-darker border border-snow/10 text-snow focus:outline-none focus:border-saffron text-center text-lg"
                                    autoFocus
                                />
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setShowPasswordPrompt(false)} className="flex-1 px-4 py-3 bg-darker hover:bg-raisin rounded-xl text-snow font-bold transition">إلغاء</button>
                                    <button type="submit" className="flex-1 px-4 py-3 bg-spanish hover:bg-blue-600 rounded-xl text-snow font-bold transition shadow-lg">تأكيد</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {(currentUser || adminMode) && !showPasswordPrompt && (
                        <div className="max-w-5xl mx-auto p-4 md:p-8 pt-6 space-y-8">

                            <header className="flex flex-col md:flex-row justify-between items-center gap-4 glass-panel px-8 py-4">
                                <div className="flex items-center gap-4">
                                    {adminMode ? (
                                        <div className="text-saffron font-black text-2xl flex items-center gap-3">
                                            <span className="text-3xl text-carmine drop-shadow-lg">👑</span>
                                            رؤية القائد
                                        </div>
                                    ) : (
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full border-2 border-verdigris overflow-hidden bg-raisin">
                                                <img src={`./MdwnhMembers/${currentUser}.png`} alt={currentUser} className="w-full h-full object-cover" />
                                            </div>
                                            <div>
                                                <p className="text-snow/60 text-sm">مرحباً بك،</p>
                                                <h1 className="text-2xl font-black text-snow drop-shadow-md">{currentUser}</h1>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button onClick={logout} className="px-5 py-2 bg-darker hover:bg-carmine text-snow rounded-full font-bold transition-colors text-sm shadow-md">
                                    تسجيل الخروج
                                </button>
                            </header>

                            {/* Stacked Layout: Adding Points Panel */}
                            <div className="glass-panel p-6 sm:p-10">
                                {adminMode && (
                                    <div className="mb-8 p-6 bg-darker/50 rounded-2xl border border-snow/5">
                                        <h2 className="text-xl font-bold mb-4 text-saffron flex items-center gap-2">
                                            إدارة الأعضاء (صلاحية القائد)
                                        </h2>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <select
                                                value={targetUser || ""}
                                                onChange={(e) => setTargetUser(e.target.value)}
                                                className="flex-1 bg-darker text-snow border border-snow/10 rounded-xl px-4 py-4 focus:outline-none focus:border-spanish font-bold text-lg appearance-none cursor-pointer"
                                            >
                                                <option value="" disabled>اختر العضو...</option>
                                                {MEMBERS.map(name => (
                                                    <option key={name} value={name}>{name}</option>
                                                ))}
                                            </select>

                                            <div className="flex gap-2">
                                                <input
                                                    type="number"
                                                    placeholder="تعيين مجموع النقاط"
                                                    value={manualTargetPoints}
                                                    onChange={(e) => setManualTargetPoints(e.target.value)}
                                                    className="w-40 bg-darker border border-snow/10 rounded-xl px-4 py-4 text-snow font-bold focus:outline-none focus:border-carmine text-center"
                                                />
                                                <button
                                                    onClick={() => performSetPoints(activeActionUser)}
                                                    disabled={!targetUser || manualTargetPoints === "" || isAddingPoints}
                                                    className="px-6 py-4 bg-carmine hover:bg-red-500 disabled:bg-darker disabled:text-snow/30 text-snow font-bold rounded-xl transition shadow-lg whitespace-nowrap"
                                                >
                                                    {isAddingPoints && addingPointsLabel === 'SET' ? <div className="loader"></div> : 'تعيين'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className={`transform transition-opacity ${adminMode && !targetUser ? 'opacity-50 pointer-events-none' : 'opacity-100'}`}>
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-black text-snow mb-2 drop-shadow-md">تسجيل الإنجازات</h2>
                                        <p className="text-snow/70 pb-2">تتم إضافة النقاط إلى: <strong className="text-verdigris font-black text-lg">{activeActionUser}</strong></p>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">
                                        <button
                                            disabled={isAddingPoints} onClick={() => addPoints(5)}
                                            className="relative overflow-hidden py-8 rounded-2xl font-black text-3xl md:text-4xl transition-all shadow-lg text-snow flex items-center justify-center bg-verdigris hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(59,185,171,0.5)] active:scale-95 disabled:opacity-75"
                                        >
                                            {isAddingPoints && addingPointsLabel === 5 ? <div className="loader"></div> : '+5'}
                                        </button>
                                        <button
                                            disabled={isAddingPoints} onClick={() => addPoints(10)}
                                            className="relative overflow-hidden py-8 rounded-2xl font-black text-3xl md:text-4xl transition-all shadow-lg text-raisin flex items-center justify-center bg-saffron hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(244,200,43,0.5)] active:scale-95 disabled:opacity-75"
                                        >
                                            {isAddingPoints && addingPointsLabel === 10 ? <div className="loader !border-raisin !border-t-snow"></div> : '+10'}
                                        </button>
                                        <button
                                            disabled={isAddingPoints} onClick={() => addPoints(20)}
                                            className="relative overflow-hidden py-8 rounded-2xl font-black text-3xl md:text-4xl transition-all shadow-lg text-snow flex items-center justify-center bg-carmine hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(240,78,58,0.5)] active:scale-95 disabled:opacity-75"
                                        >
                                            {isAddingPoints && addingPointsLabel === 20 ? <div className="loader"></div> : '+20'}
                                        </button>
                                        <button
                                            disabled={isAddingPoints} onClick={() => addPoints(30)}
                                            className="relative overflow-hidden py-8 rounded-2xl font-black text-3xl md:text-4xl transition-all shadow-lg text-snow flex items-center justify-center bg-spanish hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(8,111,182,0.5)] active:scale-95 disabled:opacity-75"
                                        >
                                            {isAddingPoints && addingPointsLabel === 30 ? <div className="loader"></div> : '+30'}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Stacked Layout: Leaderboard */}
                            <div className="glass-panel p-6 sm:p-10 mb-8">
                                <h2 className="text-3xl font-black mb-10 text-center text-snow drop-shadow-md">
                                    🏆 المتميزون 🏆
                                </h2>

                                <div className="space-y-4 max-w-4xl mx-auto">
                                    {(adminMode ? players : top3).length === 0 ? (
                                        <div className="text-center text-snow/50 py-10 font-bold">لا يوجد نقاط مسجلة بعد...</div>
                                    ) : (
                                        (adminMode ? players : top3).map((p, index) => {
                                            let medal = null;
                                            let glow = '';
                                            if (index === 0) { medal = '🥇'; glow = 'shadow-[0_0_20px_rgba(244,200,43,0.3)] border-saffron/50'; }
                                            else if (index === 1) { medal = '🥈'; glow = 'shadow-[0_0_15px_rgba(250,249,247,0.2)] border-snow/30'; }
                                            else if (index === 2) { medal = '🥉'; glow = 'shadow-[0_0_10px_rgba(240,78,58,0.2)] border-carmine/30'; }
                                            else { glow = 'border-snow/5'; medal = <span className="text-snow/30 text-xl font-black px-2">{index + 1}</span>; }

                                            return (
                                                <div key={p.name} className={`flex items-center justify-between p-4 rounded-2xl bg-darker/60 border-2 transition-transform hover:scale-[1.02] ${glow}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className="text-4xl w-10 text-center drop-shadow-lg">{medal}</div>
                                                        <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full overflow-hidden border-2 border-darker bg-raisin">
                                                            <img src={`./MdwnhMembers/${p.name}.png`} alt={p.name} className="w-full h-full object-cover" />
                                                        </div>
                                                        <span className="font-bold text-xl sm:text-2xl text-snow drop-shadow-sm">{p.name}</span>
                                                    </div>
                                                    <div className="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-l from-saffron to-verdigris pr-6 drop-shadow-lg">
                                                        {p.points}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>

                            {!adminMode && (
                                <div className="text-center pb-8">
                                    <button
                                        onClick={() => setShowPasswordPrompt(true)}
                                        className="text-xs text-snow/20 hover:text-snow/60 transition-colors select-none"
                                    >
                                        خيارات القائد
                                    </button>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
